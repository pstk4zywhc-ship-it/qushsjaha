<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>تنبيه</title>
</head>
<body>
    <script>
        // هذا الكود يقرأ النص من الرابط ويعرضه كتنبيه
        const urlParams = new URLSearchParams(window.location.search);
        const msg = urlParams.get('msg');
        
        if (msg) {
            alert(msg);
        } else {
            alert("لا يوجد نص.");
        }
    </script>
</body>
</html>
