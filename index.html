<!DOCTYPE html>
<html>
<body>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const encodedMsg = urlParams.get('msg');
        if (encodedMsg) {
            // فك التشفير وعرض النص
            const decodedMsg = decodeURIComponent(atob(encodedMsg));
            alert(decodedMsg);
        }
    </script>
</body>
</html>
